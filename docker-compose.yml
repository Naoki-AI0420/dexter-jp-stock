version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://dexter:dexter_pass@postgres:5432/dexter_db
      REDIS_URL: redis://redis:6379
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - dexter_net

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/certs:/etc/nginx/certs:ro
      - certbot_webroot:/var/www/certbot:ro
    depends_on:
      - app
    networks:
      - dexter_net

  # Let's Encrypt certificate issuance (run once, then renew via cron)
  certbot:
    image: certbot/certbot:latest
    profiles:
      - certbot
    volumes:
      - ./docker/certs:/etc/letsencrypt
      - certbot_webroot:/var/www/certbot
    command: >
      certonly --webroot
      --webroot-path=/var/www/certbot
      --email ${CERT_EMAIL}
      --agree-tos
      --no-eff-email
      -d ${DOMAIN}
    networks:
      - dexter_net

  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: dexter
      POSTGRES_PASSWORD: dexter_pass
      POSTGRES_DB: dexter_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dexter -d dexter_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dexter_net

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dexter_net

volumes:
  postgres_data:
  redis_data:
  certbot_webroot:

networks:
  dexter_net:
    driver: bridge
